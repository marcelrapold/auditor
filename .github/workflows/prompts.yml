name: prompts

on:
  push:
    branches: [main]
    paths:
      - "audit-prompts/**"
      - "scripts/check-prompts.mjs"
      - ".github/workflows/prompts.yml"
  pull_request:
    paths:
      - "audit-prompts/**"
      - "scripts/check-prompts.mjs"
      - ".github/workflows/prompts.yml"

permissions:
  contents: read

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Canonical prompt structure (interoperability)
        run: node scripts/check-prompts.mjs
