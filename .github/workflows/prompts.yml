name: prompts

# No `paths` filter: the checksum verification is the supply-chain trust anchor
# external agents rely on, so it must run on EVERY push/PR — a change anywhere
# (not just under the gated prompt paths) could otherwise let checksum drift
# ship. The structure + checksum checks are fast and dependency-free.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc
      - name: Canonical prompt structure (interoperability)
        run: node scripts/check-prompts.mjs
      - name: Verify CHECKSUMS.txt is in sync (single-source regen)
        run: node scripts/checksums.mjs --check
      - name: Verify prompt checksums (untrusted-fetch trust anchor)
        run: sha256sum -c CHECKSUMS.txt
