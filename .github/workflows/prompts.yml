name: prompts

on:
  push:
    branches: [main]
    paths:
      - "audit-prompts/**"
      - "scripts/check-prompts.mjs"
      - "DOCUMENTATION-STANDARD*.md"
      - "ISSUE-OUTPUT-STANDARD.md"
      - "CHECKSUMS.txt"
      - ".github/workflows/prompts.yml"
  pull_request:
    paths:
      - "audit-prompts/**"
      - "scripts/check-prompts.mjs"
      - "DOCUMENTATION-STANDARD*.md"
      - "ISSUE-OUTPUT-STANDARD.md"
      - "CHECKSUMS.txt"
      - ".github/workflows/prompts.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc
      - name: Canonical prompt structure (interoperability)
        run: node scripts/check-prompts.mjs
      - name: Verify prompt checksums (untrusted-fetch trust anchor)
        run: sha256sum -c CHECKSUMS.txt
