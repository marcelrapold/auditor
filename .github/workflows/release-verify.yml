name: release-verify

# Self-verifying releases: on every vX.Y.Z tag, assert that all version pins in
# the tagged tree (orchestrator prompt URLs, llms.txt URLs, the landing-page
# VERSION constant) plus the CHECKSUMS.txt trust anchor match the tag itself.
# A mismatch fails the release rather than shipping a stale or broken pin.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc
      - name: Verify every version pin equals the release tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/verify-pins.mjs
      - name: Verify CHECKSUMS.txt matches the tagged content
        run: node scripts/checksums.mjs --check
      - name: Verify prompt checksums (untrusted-fetch trust anchor)
        run: sha256sum -c CHECKSUMS.txt
