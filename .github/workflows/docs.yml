name: docs

on:
  push:
    branches: [main]
    paths: ["**/*.md", ".github/workflows/docs.yml"]
  pull_request:
    paths: ["**/*.md", ".github/workflows/docs.yml"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md
            !web/node_modules
            !**/node_modules

      - name: No emojis in Markdown headings (DOCUMENTATION-STANDARD §5)
        run: |
          set -euo pipefail
          # Fail if any Markdown heading line contains an emoji.
          if grep -rPln '^#{1,6}\s.*[\x{1F000}-\x{1FAFF}\x{2600}-\x{27BF}\x{2B00}-\x{2BFF}\x{2190}-\x{21FF}\x{2300}-\x{23FF}\x{FE0F}\x{200D}]' \
              --include='*.md' --exclude-dir=node_modules .; then
            echo "::error::Emoji found in a Markdown heading — see DOCUMENTATION-STANDARD.md §5."
            exit 1
          fi
          echo "OK: no emojis in headings."

      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --no-progress
            --max-retries 2
            --accept 200..=299,403,429
            --exclude-path web/node_modules
            --exclude-path templates
            --exclude auditor\.rapold\.io
            --exclude makeareadme\.com
            --exclude raw\.githubusercontent\.com/marcelrapold/auditor
            './**/*.md'
          fail: true
